name: 💡 Feature request
description: Suggest an idea, a theme, or an improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are welcome — themes and language tweaks especially. Before
        filing, skim the README's **Status** section: URL capture / OG cards
        are deliberately deferred to web capture.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the friction or the missing capability, not just the solution.
      placeholder: "When I share snippets to …, I always have to …"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered (optional)
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy posture
      description: Vitrine is local-first by design.
      options:
        - label: This feature can work fully on-device (no accounts, no telemetry, no remote services).
