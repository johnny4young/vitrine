name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Weekly drift watch (CS-060): GitHub rolls the macOS runner image and the
  # bundled Xcode/SDK on its own schedule, which can break the build with no code
  # change. A scheduled run on the default branch exercises the full gate against
  # whatever the current image ships, so drift surfaces here instead of on the
  # next unrelated PR. Mondays 08:00 UTC.
  schedule:
    - cron: "0 8 * * 1"
  # Allow re-running the gate (including the drift check) on demand.
  workflow_dispatch:

# CI only reads the repository; it never pushes, comments, or publishes. Explicit
# read-only permissions keep the job token harmless if any step is compromised.
permissions:
  contents: read

concurrency:
  # Scheduled and manual runs have no PR ref to coalesce on, so key them by run id
  # to avoid cancelling an in-flight drift run.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'schedule' && github.run_id || '' }}
  # Superseded PR pushes are safe to cancel; pushes to main are not — every main
  # commit should keep a completed run so drift and regressions stay bisectable.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fast, cheap gate on a Linux runner: shell lint, workflow YAML syntax, the
  # CHANGELOG↔version lockstep, and the golden manifest↔fixture cross-check all
  # fail here in well under a minute, before any macOS minutes are spent. The
  # macOS jobs do not depend on it so a Linux-only hiccup never blocks the build.
  checks:
    name: Static checks (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      # shellcheck ships preinstalled on ubuntu-latest. Severity is capped at
      # warning: the scripts carry targeted `# shellcheck disable=` directives
      # where an info-level finding is a false positive by design.
      - name: Lint shell scripts (shellcheck)
        run: shellcheck --severity=warning scripts/*.sh

      # Validate every workflow's YAML syntax. This is the CI counterpart to
      # WorkflowConfigurationTests, which asserts the *structure* the acceptance
      # criteria require; this step guards against a malformed YAML edit that the
      # structural test's targeted reads might not surface.
      - name: Validate workflow YAML
        run: |
          set -euo pipefail
          for f in .github/workflows/*.yml; do
            ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$f"
            echo "✓ $f"
          done

      # Same assertion as the AppStoreReadinessTests lockstep check, but running
      # before any macOS build: the newest CHANGELOG entry must match
      # MARKETING_VERSION and an [Unreleased] section must exist.
      - name: CHANGELOG matches project version
        run: make changelog-check

      # Localization completeness (CS-047): every translatable key in the String
      # Catalog must carry a translated Spanish entry (or fully translated plural
      # variations). The macOS LocalizationTests enforce deeper invariants; this
      # cheap gate catches a missing translation before any macOS minutes.
      - name: String Catalog Spanish coverage
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import json, sys
          catalog = json.load(open("Vitrine/Resources/Localizable.xcstrings"))
          def translated(localization):
              unit = localization.get("stringUnit")
              if unit is not None:
                  return unit.get("state") == "translated"
              variations = localization.get("variations", {})
              units = [
                  form.get("stringUnit", {})
                  for kind in variations.values()
                  for form in kind.values()
              ]
              return bool(units) and all(u.get("state") == "translated" for u in units)
          failures = [
              key
              for key, entry in catalog["strings"].items()
              if entry.get("shouldTranslate", True)
              and not translated(entry.get("localizations", {}).get("es", {}))
          ]
          for key in sorted(failures):
              print(f"::error title=Missing Spanish translation (CS-047)::{key!r} has no translated 'es' entry in Localizable.xcstrings.")
          if failures:
              sys.exit(1)
          print(f"✓ all {len(catalog['strings'])} catalog keys carry a translated Spanish entry.")
          EOF

      # Architecture-doc drift guard: docs/ARCHITECTURE.md bills itself as
      # mirroring the module layout under Vitrine/, and it is the one artifact the
      # deep review found drifting (a whole module missing). Fail when a top-level
      # module directory is never mentioned.
      - name: ARCHITECTURE.md mentions every module
        run: |
          set -euo pipefail
          status=0
          for dir in Vitrine/*/; do
            module="$(basename "$dir")"
            if ! grep -q "${module}/" docs/ARCHITECTURE.md; then
              echo "::error title=ARCHITECTURE.md drift::Vitrine/${module}/ exists but docs/ARCHITECTURE.md never mentions it."
              status=1
            fi
          done
          [ "$status" -eq 0 ] && echo "✓ every Vitrine/ module is documented."
          exit "$status"

      # Golden baseline integrity (CS-025): every scenario pinned in the manifest
      # must have its PNG committed, and every committed PNG must be pinned. A gap
      # means the strict pixel diff silently degrades to render-only coverage.
      - name: Golden manifest ↔ fixture cross-check
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import json, pathlib, sys
          golden = pathlib.Path("Tests/Fixtures/Golden")
          scenarios = set(json.loads((golden / "manifest.json").read_text())["scenarios"])
          pngs = {p.stem for p in golden.glob("*.png")}
          missing = scenarios - pngs
          orphaned = pngs - scenarios
          for name in sorted(missing):
              print(f"::error title=Golden fixture missing (CS-025)::{name} is pinned in manifest.json but {name}.png is not committed — the strict diff can never run for it.")
          for name in sorted(orphaned):
              print(f"::error title=Golden fixture orphaned (CS-025)::{name}.png is committed but not pinned in manifest.json.")
          if missing or orphaned:
              sys.exit(1)
          print(f"✓ {len(scenarios)} golden scenarios all have committed fixtures.")
          EOF

  build:
    name: Lint & build
    # macos-latest is the moving "current" image; the drift job above is what
    # catches it rolling. The "Toolchain versions" step records the exact
    # macOS/Xcode/Swift this run built against, satisfying the CS-060 acceptance
    # to log exact versions before building.
    runs-on: macos-latest
    # Cap the job well under the 6-hour default: a wedged SPM resolve or hung
    # xcodebuild should surface in minutes, not burn six hours of macOS minutes.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Export DEVELOPER_DIR
        run: echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"

      # Record the exact toolchain this run built against (CS-060). Printed before
      # any build step and echoed into the job summary so a green/red result is
      # always tied to a known macOS image, Xcode, and Swift version — the anchor
      # for diagnosing runner drift.
      - name: Toolchain versions
        run: |
          {
            echo "### Toolchain (CS-060)"
            echo '```'
            echo "Event: ${GITHUB_EVENT_NAME}"
            echo "Image: ${ImageOS:-unknown} (${ImageVersion:-unknown})"
            sw_vers
            echo "DEVELOPER_DIR=${DEVELOPER_DIR}"
            xcodebuild -version
            swift --version
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Install XcodeGen
        run: brew install xcodegen

      # Cache the global Swift Package Manager download/clone cache (CS-060). This
      # directory is a content-addressed checkout cache, safe to restore across
      # runs; xcodebuild repopulates and re-resolves into DerivedData as needed, so
      # a stale or partial cache only costs a re-download, never a wrong build. The
      # key is bound to project.yml because that file is the single source of truth
      # for the package dependencies (the resolved project is generated, not
      # committed).
      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Lint (swift-format)
        run: make lint

      # Capture an .xcresult bundle for each xcodebuild phase (CS-060) so a failure
      # can be triaged offline from the uploaded artifact. RESULT_BUNDLE is honored
      # by the build/test/build-ui-tests make targets.
      - name: Build (Debug)
        run: make build RESULT_BUNDLE="${RUNNER_TEMP}/build.xcresult"

      - name: Build UI tests
        run: make build-ui-tests RESULT_BUNDLE="${RUNNER_TEMP}/build-ui-tests.xcresult"

      - name: Test (Swift Testing)
        run: make test RESULT_BUNDLE="${RUNNER_TEMP}/test.xcresult"

      # Surface per-target code coverage in the job summary. The scheme already
      # gathers coverage (project.yml: gatherCoverageData); without this step the
      # numbers exist only inside an .xcresult nobody downloads on green runs.
      # Best-effort: a reporting hiccup must never fail the gate.
      - name: Report code coverage
        run: |
          if [ -d "${RUNNER_TEMP}/test.xcresult" ]; then
            {
              echo "### Code coverage (per target)"
              echo '```'
              xcrun xccov view --report --only-targets "${RUNNER_TEMP}/test.xcresult" || echo "xccov could not read the result bundle"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # On any failure above, upload the .xcresult bundles so the exact build/test
      # diagnostics are available without re-running CI. Compressed because an
      # .xcresult is a directory bundle.
      - name: Upload .xcresult bundles
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcresults
          path: |
            ${{ runner.temp }}/build.xcresult
            ${{ runner.temp }}/build-ui-tests.xcresult
            ${{ runner.temp }}/test.xcresult
          if-no-files-found: ignore

      # Launch-gallery design-QA artifacts (CS-039). The unit suite already renders
      # and verifies every gallery sample; on a FAILURE, regenerate the gallery into
      # a workspace directory and upload it so a reviewer can eyeball the *actual*
      # rendered images for design review instead of inferring a visual regression
      # from a log. The generator stages PNGs + manifest in the sandboxed host's
      # container temp and prints one `GALLERY OUTPUT <path>` line; copy that out.
      - name: Render gallery for design review
        if: failure()
        run: |
          set -o pipefail
          xcodebuild -project Vitrine.xcodeproj -scheme Vitrine -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:VitrineTests/SampleGalleryGeneratorTests \
            VITRINE_GENERATE_GALLERY=1 test 2>&1 | tee gallery.log || true
          staging="$(grep -m1 'GALLERY OUTPUT ' gallery.log | sed 's/^.*GALLERY OUTPUT //')"
          dest="${RUNNER_TEMP}/vitrine-gallery-review"
          mkdir -p "${dest}"
          if [ -n "${staging}" ] && [ -d "${staging}" ]; then
            cp "${staging}"/*.png "${dest}/" 2>/dev/null || true
            cp "${staging}/manifest.json" "${dest}/" 2>/dev/null || true
            echo "Collected $(ls "${dest}"/*.png 2>/dev/null | wc -l | tr -d ' ') gallery images for review."
          else
            echo "::warning title=Gallery render (CS-039)::could not locate the generator staging directory."
          fi
      - name: Upload gallery design-review artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: launch-gallery
          path: ${{ runner.temp }}/vitrine-gallery-review
          if-no-files-found: ignore

      # Render-latency budget (CS-026). Documented two-tier threshold: the suite
      # FAILS only past the hard ceiling (a real, order-of-magnitude regression),
      # and WARNS when the 300 ms target is exceeded — surfaced here as GitHub
      # annotations so a drift toward the limit is visible on the PR without
      # red-flagging noisy shared CI hardware.
      - name: Performance budget (CS-026)
        run: |
          set -o pipefail
          make perf 2>&1 | tee perf.log
        # Promote any `PERF WARN` lines the run logged into GitHub annotations.
        # `if: always()` so warnings still surface even when the hard ceiling
        # tripped and the step above failed.
      - name: Annotate performance warnings
        if: always()
        run: |
          if [ -f perf.log ] && grep -q 'PERF WARN' perf.log; then
            grep 'PERF WARN' perf.log | while IFS= read -r line; do
              echo "::warning title=Render latency over target (CS-026)::${line}"
            done
          fi

      # Golden-image regression suite (CS-025). The strict pixel comparison runs
      # only on the pinned runner image recorded in Tests/Fixtures/Golden/
      # manifest.json; on any other image each scenario logs `GOLDEN SKIP` and the
      # render is still exercised end to end, so this step stays green off the pin
      # while a real regression on the pinned image fails it. A `GOLDEN SKIP` line
      # is promoted to an annotation so it is visible that the strict diff did not
      # run here.
      # SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH=1 mirrors `make test`: the
      # golden suite is the most CoreText-heavy in the repo, and concurrent
      # typesetting intermittently crashes the harness (see the Makefile's `test`
      # target for the full rationale).
      - name: Golden-image suite (CS-025)
        run: |
          set -o pipefail
          env SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH=1 \
            xcodebuild -project Vitrine.xcodeproj -scheme Vitrine -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:VitrineTests/GoldenImageTests test 2>&1 | tee golden.log
      - name: Annotate skipped golden comparison
        if: always()
        run: |
          if [ -f golden.log ] && grep -q 'GOLDEN SKIP' golden.log; then
            echo "::warning title=Golden pixel diff skipped (CS-025)::This runner is not the pinned image; strict golden comparison was skipped (render coverage still ran)."
          fi
      # Upload the rendered "actual" images and diff masks for inspection when a
      # golden comparison fails on the pinned image. The suite writes them under a
      # stable temp directory; collect that path on failure.
      - name: Upload golden diff artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: golden-diffs
          path: ${{ runner.temp }}/vitrine-golden-diffs
          if-no-files-found: ignore

      # Artifact smoke for the standalone comparator (CS-025): prove
      # scripts/compare-goldens.swift can diff a committed golden against an exact
      # copy of itself (a guaranteed match) and against an obviously different
      # image (a guaranteed mismatch), so the tool CI would use to triage an
      # uploaded artifact is itself verified.
      - name: Golden comparator smoke (CS-025)
        run: |
          set -euo pipefail
          golden=$(ls Tests/Fixtures/Golden/*.png 2>/dev/null | head -n 1 || true)
          if [ -z "${golden}" ]; then
            echo "No golden fixtures committed yet; skipping comparator smoke."
            exit 0
          fi
          cp "${golden}" "${RUNNER_TEMP}/copy.png"
          echo "Identical comparison (expect MATCH, exit 0):"
          swift scripts/compare-goldens.swift "${golden}" "${RUNNER_TEMP}/copy.png"
          other=$(ls Tests/Fixtures/Golden/*.png | tail -n 1)
          if [ "${other}" != "${golden}" ]; then
            echo "Different-image comparison (expect DIFFER, exit 1):"
            if swift scripts/compare-goldens.swift "${golden}" "${other}"; then
              echo "::error title=Golden comparator smoke (CS-025)::expected a mismatch but the comparator reported a match"
              exit 1
            fi
            echo "Comparator correctly reported a mismatch."
          fi

  # Full XCUITest execution (CS-060 follow-up). Compile-only `build-ui-tests`
  # kept UI-test failures invisible on main; this job actually runs the suite on
  # every PR/push. Driving the menu-bar app through XCUIAutomation needs the
  # macOS automation authorization, which is interactive on a dev machine — but
  # GitHub's hosted macOS images are provisioned for headless UI automation
  # (DevToolsSecurity, automation mode without authentication, SIP disabled), so
  # the suite executes here, verified empirically on the macos-15-arm64 image
  # (20260527) — see docs/RELEASING.md (Running the UI tests).
  # A separate job so it parallelizes with the build gate and a UI flake never
  # blocks the build job's artifacts.
  ui-test:
    name: UI tests
    runs-on: macos-latest
    # The suite hangs (rather than fails) if automation init wedges; cap the job
    # so a wedged run surfaces in minutes, not after the 6-hour default.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Export DEVELOPER_DIR
        run: echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"

      # Same toolchain anchor as the build job (CS-060): tie this job's result to
      # the exact image/Xcode it ran against.
      - name: Toolchain versions
        run: |
          {
            echo "### Toolchain — UI tests (CS-060)"
            echo '```'
            echo "Image: ${ImageOS:-unknown} (${ImageVersion:-unknown})"
            sw_vers
            xcodebuild -version
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # Diagnostic only — never a gate. Empirically (macos-15-arm64 image
      # 20260527) the suite executes even while `automationmodetool` reports
      # "Automation Mode is disabled": the image runs with SIP disabled and is
      # provisioned for headless automation, so that output does not predict
      # whether XCUITest can drive the UI. Record the posture next to the result
      # so an image regression can be triaged from the log.
      - name: Log automation authorization state
        run: |
          {
            echo "### Automation authorization (diagnostic)"
            echo '```'
            echo "automationmodetool: $(automationmodetool || true)"
            echo "DevToolsSecurity: $(DevToolsSecurity -status || true)"
            echo "csrutil: $(csrutil status || true)"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # The whole suite runs here, including the four display-geometry-sensitive
      # tests that used to be skipped on the runner's 1024x768 virtual display:
      # the editor now sizes new/recovered windows to fit the screen, and the
      # tests skip themselves (with a clear message) only below the editor's
      # minimum supported display — see docs/RELEASING.md (Running the UI tests).
      - name: Run UI tests
        run: |
          set -o pipefail
          make test-ui RESULT_BUNDLE="${RUNNER_TEMP}/test-ui.xcresult" 2>&1 | tee test-ui.log

      # Tell an automation-authorization failure apart from an ordinary test
      # failure: the former is a runner-image regression (it has happened —
      # actions/runner-images#7621, #8546), not a product bug, and should be
      # read as such.
      - name: Classify automation failure
        if: failure()
        run: |
          if [ -f test-ui.log ] && grep -q "failed to initialize for UI testing" test-ui.log; then
            echo "::error title=UI automation blocked on this image::The XCUITest session could not initialize. The runner image has likely lost its pre-authorized automation state (cf. actions/runner-images#7621) — an infrastructure regression, not a test failure. See docs/RELEASING.md (Running the UI tests)."
          fi

      - name: Upload .xcresult bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-xcresult
          path: ${{ runner.temp }}/test-ui.xcresult
          if-no-files-found: ignore
