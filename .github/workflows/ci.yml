name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Weekly drift watch (CS-060): GitHub rolls the macOS runner image and the
  # bundled Xcode/SDK on its own schedule, which can break the build with no code
  # change. A scheduled run on the default branch exercises the full gate against
  # whatever the current image ships, so drift surfaces here instead of on the
  # next unrelated PR. Mondays 08:00 UTC.
  schedule:
    - cron: "0 8 * * 1"
  # Allow re-running the gate (including the drift check) on demand.
  workflow_dispatch:

concurrency:
  # Scheduled and manual runs have no PR ref to coalesce on, so key them by run id
  # to avoid cancelling an in-flight drift run.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'schedule' && github.run_id || '' }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & build
    # macos-latest is the moving "current" image; the drift job above is what
    # catches it rolling. The "Toolchain versions" step records the exact
    # macOS/Xcode/Swift this run built against, satisfying the CS-060 acceptance
    # to log exact versions before building.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Export DEVELOPER_DIR
        run: echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"

      # Record the exact toolchain this run built against (CS-060). Printed before
      # any build step and echoed into the job summary so a green/red result is
      # always tied to a known macOS image, Xcode, and Swift version — the anchor
      # for diagnosing runner drift.
      - name: Toolchain versions
        run: |
          {
            echo "### Toolchain (CS-060)"
            echo '```'
            echo "Event: ${GITHUB_EVENT_NAME}"
            echo "Image: ${ImageOS:-unknown} (${ImageVersion:-unknown})"
            sw_vers
            echo "DEVELOPER_DIR=${DEVELOPER_DIR}"
            xcodebuild -version
            swift --version
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Install XcodeGen
        run: brew install xcodegen

      # Cache the global Swift Package Manager download/clone cache (CS-060). This
      # directory is a content-addressed checkout cache, safe to restore across
      # runs; xcodebuild repopulates and re-resolves into DerivedData as needed, so
      # a stale or partial cache only costs a re-download, never a wrong build. The
      # key is bound to project.yml because that file is the single source of truth
      # for the package dependencies (the resolved project is generated, not
      # committed).
      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Validate every workflow's YAML syntax with Ruby's standard-library parser
      # (ships on the macOS runner; no extra install). This is the CI counterpart
      # to WorkflowConfigurationTests, which asserts the *structure* the acceptance
      # criteria require; this step guards against a malformed YAML edit that the
      # structural test's targeted reads might not surface.
      - name: Validate workflow YAML
        run: |
          set -euo pipefail
          for f in .github/workflows/*.yml; do
            ruby -ryaml -e 'YAML.load_file(ARGV[0])' "$f"
            echo "✓ $f"
          done

      - name: Lint (swift-format)
        run: make lint

      # Capture an .xcresult bundle for each xcodebuild phase (CS-060) so a failure
      # can be triaged offline from the uploaded artifact. RESULT_BUNDLE is honored
      # by the build/test/build-ui-tests make targets.
      - name: Build (Debug)
        run: make build RESULT_BUNDLE="${RUNNER_TEMP}/build.xcresult"

      - name: Build UI tests
        run: make build-ui-tests RESULT_BUNDLE="${RUNNER_TEMP}/build-ui-tests.xcresult"

      - name: Test (Swift Testing)
        run: make test RESULT_BUNDLE="${RUNNER_TEMP}/test.xcresult"

      # On any failure above, upload the .xcresult bundles so the exact build/test
      # diagnostics are available without re-running CI. Compressed because an
      # .xcresult is a directory bundle.
      - name: Upload .xcresult bundles
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcresults
          path: |
            ${{ runner.temp }}/build.xcresult
            ${{ runner.temp }}/build-ui-tests.xcresult
            ${{ runner.temp }}/test.xcresult
          if-no-files-found: ignore

      # Launch-gallery design-QA artifacts (CS-039). The unit suite already renders
      # and verifies every gallery sample; on a FAILURE, regenerate the gallery into
      # a workspace directory and upload it so a reviewer can eyeball the *actual*
      # rendered images for design review instead of inferring a visual regression
      # from a log. The generator stages PNGs + manifest in the sandboxed host's
      # container temp and prints one `GALLERY OUTPUT <path>` line; copy that out.
      - name: Render gallery for design review
        if: failure()
        run: |
          set -o pipefail
          xcodebuild -project Vitrine.xcodeproj -scheme Vitrine -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:VitrineTests/SampleGalleryGeneratorTests \
            VITRINE_GENERATE_GALLERY=1 test 2>&1 | tee gallery.log || true
          staging="$(grep -m1 'GALLERY OUTPUT ' gallery.log | sed 's/^.*GALLERY OUTPUT //')"
          dest="${RUNNER_TEMP}/vitrine-gallery-review"
          mkdir -p "${dest}"
          if [ -n "${staging}" ] && [ -d "${staging}" ]; then
            cp "${staging}"/*.png "${dest}/" 2>/dev/null || true
            cp "${staging}/manifest.json" "${dest}/" 2>/dev/null || true
            echo "Collected $(ls "${dest}"/*.png 2>/dev/null | wc -l | tr -d ' ') gallery images for review."
          else
            echo "::warning title=Gallery render (CS-039)::could not locate the generator staging directory."
          fi
      - name: Upload gallery design-review artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: launch-gallery
          path: ${{ runner.temp }}/vitrine-gallery-review
          if-no-files-found: ignore

      # Render-latency budget (CS-026). Documented two-tier threshold: the suite
      # FAILS only past the hard ceiling (a real, order-of-magnitude regression),
      # and WARNS when the 300 ms target is exceeded — surfaced here as GitHub
      # annotations so a drift toward the limit is visible on the PR without
      # red-flagging noisy shared CI hardware.
      - name: Performance budget (CS-026)
        run: |
          set -o pipefail
          make perf 2>&1 | tee perf.log
        # Promote any `PERF WARN` lines the run logged into GitHub annotations.
        # `if: always()` so warnings still surface even when the hard ceiling
        # tripped and the step above failed.
      - name: Annotate performance warnings
        if: always()
        run: |
          if [ -f perf.log ] && grep -q 'PERF WARN' perf.log; then
            grep 'PERF WARN' perf.log | while IFS= read -r line; do
              echo "::warning title=Render latency over target (CS-026)::${line}"
            done
          fi

      # Golden-image regression suite (CS-025). The strict pixel comparison runs
      # only on the pinned runner image recorded in Tests/Fixtures/Golden/
      # manifest.json; on any other image each scenario logs `GOLDEN SKIP` and the
      # render is still exercised end to end, so this step stays green off the pin
      # while a real regression on the pinned image fails it. A `GOLDEN SKIP` line
      # is promoted to an annotation so it is visible that the strict diff did not
      # run here.
      - name: Golden-image suite (CS-025)
        run: |
          set -o pipefail
          xcodebuild -project Vitrine.xcodeproj -scheme Vitrine -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:VitrineTests/GoldenImageTests test 2>&1 | tee golden.log
      - name: Annotate skipped golden comparison
        if: always()
        run: |
          if [ -f golden.log ] && grep -q 'GOLDEN SKIP' golden.log; then
            echo "::warning title=Golden pixel diff skipped (CS-025)::This runner is not the pinned image; strict golden comparison was skipped (render coverage still ran)."
          fi
      # Upload the rendered "actual" images and diff masks for inspection when a
      # golden comparison fails on the pinned image. The suite writes them under a
      # stable temp directory; collect that path on failure.
      - name: Upload golden diff artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: golden-diffs
          path: ${{ runner.temp }}/vitrine-golden-diffs
          if-no-files-found: ignore

      # Artifact smoke for the standalone comparator (CS-025): prove
      # scripts/compare-goldens.swift can diff a committed golden against an exact
      # copy of itself (a guaranteed match) and against an obviously different
      # image (a guaranteed mismatch), so the tool CI would use to triage an
      # uploaded artifact is itself verified.
      - name: Golden comparator smoke (CS-025)
        run: |
          set -euo pipefail
          golden=$(ls Tests/Fixtures/Golden/*.png 2>/dev/null | head -n 1 || true)
          if [ -z "${golden}" ]; then
            echo "No golden fixtures committed yet; skipping comparator smoke."
            exit 0
          fi
          cp "${golden}" "${RUNNER_TEMP}/copy.png"
          echo "Identical comparison (expect MATCH, exit 0):"
          swift scripts/compare-goldens.swift "${golden}" "${RUNNER_TEMP}/copy.png"
          other=$(ls Tests/Fixtures/Golden/*.png | tail -n 1)
          if [ "${other}" != "${golden}" ]; then
            echo "Different-image comparison (expect DIFFER, exit 1):"
            if swift scripts/compare-goldens.swift "${golden}" "${other}"; then
              echo "::error title=Golden comparator smoke (CS-025)::expected a mismatch but the comparator reported a match"
              exit 1
            fi
            echo "Comparator correctly reported a mismatch."
          fi
