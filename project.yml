# XcodeGen spec — the source of truth for Vitrine.xcodeproj.
# Regenerate with `xcodegen generate` (or `make project`). Do not hand-edit the
# generated .xcodeproj; it is git-ignored.

name: Vitrine

options:
  bundleIdPrefix: app.vitrine
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

# Project-wide build settings.
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Latest Swift language mode + Swift 6.2 "approachable concurrency": the whole
    # module defaults to @MainActor isolation (the recommended model for an app),
    # which removes the need for scattered @MainActor / nonisolated(unsafe).
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES

# Swift Package Manager dependencies (the three from the spec).
packages:
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.3.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "1.10.0"
  Settings:
    url: https://github.com/sindresorhus/Settings
    from: "3.0.0"

targets:
  Vitrine:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Vitrine
        excludes:
          - "Resources/Info.plist"
          - "Resources/Vitrine.entitlements"
          - "Resources/Fonts"
      # Folder reference so the fonts land in Contents/Resources/Fonts/, which
      # ATSApplicationFontsPath ("Fonts") registers at launch.
      - path: Vitrine/Resources/Fonts
        type: folder
        buildPhase: resources
    dependencies:
      - package: Highlightr
      - package: KeyboardShortcuts
      - package: Settings
    settings:
      base:
        PRODUCT_NAME: Vitrine
        PRODUCT_BUNDLE_IDENTIFIER: app.vitrine
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Vitrine/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Vitrine/Resources/Vitrine.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES

  VitrineTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: Vitrine
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.vitrine.VitrineTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Vitrine.app/Contents/MacOS/Vitrine"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Vitrine:
    build:
      targets:
        Vitrine: all
        VitrineTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - VitrineTests
    profile:
      config: Release
