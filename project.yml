# XcodeGen spec — the source of truth for Vitrine.xcodeproj.
# Regenerate with `xcodegen generate` (or `make project`). Do not hand-edit the
# generated .xcodeproj; it is git-ignored.

name: Vitrine

options:
  bundleIdPrefix: com.johnny4young.vitrine
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  # Localization (CS-047): English is the development language and the source of
  # the String Catalog (Vitrine/Resources/Localizable.xcstrings); Spanish ships as
  # a real second locale to prove the pipeline end to end. "Base" is listed so the
  # generated project carries a Base development region for the catalog's UI keys.
  developmentLanguage: en
  knownRegions:
    - en
    - es
    - Base

# Project-wide build settings.
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Latest Swift language mode + Swift 6.2 "approachable concurrency": the whole
    # module defaults to @MainActor isolation (the recommended model for an app),
    # which removes the need for scattered @MainActor / nonisolated(unsafe).
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    # Direct-download channel marker (CS-064). Code guarded by
    # `#if VITRINE_DIRECT_DOWNLOAD` ships in the direct-download build (the default) and
    # is compiled out of the Mac App Store binary, which also strips the Sparkle
    # framework (see docs/APP-STORE.md, appstore.yml). ON by default so the DMG ships the
    # live Sparkle updater; the App Store archive removes this flag. Sparkle ships as a
    # LOCAL framework embedded into the app bundle (see the dependency note below); the
    # framework is fetched + checksum-verified by scripts/fetch-sparkle.sh into Vendor/.
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) VITRINE_DIRECT_DOWNLOAD
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES

# Swift Package Manager dependencies.
packages:
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.3.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    # 2.x drops the deprecated `on()` handler API (we use `events(_:for:)`) and
    # tightens strict-concurrency annotations — both aligned with this codebase.
    from: "2.4.0"
  Settings:
    url: https://github.com/sindresorhus/Settings
    from: "3.0.0"

targets:
  Vitrine:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Vitrine
        excludes:
          - "Resources/Info.plist"
          - "Resources/Vitrine.entitlements"
          # Direct-download (Sparkle) entitlements superset (CS-064); used only by
          # the DMG build via CODE_SIGN_ENTITLEMENTS in scripts/build-dmg.sh, never
          # compiled as a source.
          - "Resources/Vitrine.DirectDownload.entitlements"
          - "Resources/Fonts"
      # Folder reference so the fonts land in Contents/Resources/Fonts/, which
      # ATSApplicationFontsPath ("Fonts") registers at launch.
      - path: Vitrine/Resources/Fonts
        type: folder
        buildPhase: resources
    dependencies:
      - package: Highlightr
      - package: KeyboardShortcuts
      - package: Settings
      # Sparkle auto-update (CS-064): embedded as a LOCAL framework fetched by
      # scripts/fetch-sparkle.sh into Vendor/ (gitignored), NOT via the SPM binary
      # artifact — its resolution hung intermittently on headless CI runners. Every
      # call site is behind `#if VITRINE_DIRECT_DOWNLOAD`; the App Store build strips it.
      - framework: Vendor/Sparkle.framework
        embed: true
      # App Intents (CS-034): linking the framework lets the build's
      # appintentsmetadataprocessor extract the Shortcuts actions and enums so they
      # appear in Shortcuts/Spotlight/Siri.
      - sdk: AppIntents.framework
    # App Store distribution readiness (CS-062, see docs/APP-STORE.md). The metadata an
    # App Store submission needs is the app's existing identity, sourced here and in
    # Vitrine/Resources/Info.plist (no App Store-only settings are invented):
    #   - Bundle identifier: PRODUCT_BUNDLE_IDENTIFIER below (com.johnny4young.vitrine).
    #   - Primary category: LSApplicationCategoryType in Info.plist (Developer Tools).
    #   - Versioning: MARKETING_VERSION + CURRENT_PROJECT_VERSION (project-wide `settings`
    #     above). App Store Connect requires the build number to increase per marketing
    #     version, so a resubmission of the same version must bump CURRENT_PROJECT_VERSION.
    #   - Copyright: NSHumanReadableCopyright in Info.plist.
    # The SAME app target ships through the direct-download DMG and the optional Mac App
    # Store; the entitlement set (Vitrine.entitlements) is identical across channels and
    # the App Sandbox stays on (required by the App Store). DEVELOPMENT_TEAM stays empty
    # and CODE_SIGN_STYLE Automatic so the repo builds without an Apple account; a real
    # App Store archive supplies the Team ID and the App Store provisioning profile at
    # archive/export time (Xcode Organizer or an `app-store` ExportOptions.plist).
    settings:
      base:
        PRODUCT_NAME: Vitrine
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.vitrine
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Vitrine/Resources/Info.plist
        # Injected at generate time via the VITRINE_ENTITLEMENTS_FILE env var (Makefile
        # default = minimal App Store / Phase 1 set; scripts/build-dmg.sh exports the
        # direct-download superset, CS-064). XcodeGen ${...} interpolation writes a literal
        # path into the project, so the build resolves no xcodebuild-time variable (which
        # stalled the CI runner) and nothing leaks onto the SPM resource bundles (CS-061).
        CODE_SIGN_ENTITLEMENTS: ${VITRINE_ENTITLEMENTS_FILE}
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES

  # Command-line renderer (CS-033). `vitrine render input.swift --out image.png`.
  #
  # The CLI reuses the app's *render half* unchanged so its output is pixel-identical
  # to the GUI: it compiles the same `Vitrine/` source tree (models, `SnapshotCanvas`,
  # `ExportManager`, `HighlightManager`, …) and supplies its own `main.swift` entry,
  # excluding only the SwiftUI `@main` app (`VitrineApp.swift`) so there is a single
  # entry point. It hosts a minimal accessory `NSApplication` (no Dock/menu) because
  # `ImageRenderer`/Highlightr require AppKit on the main actor; see VitrineCLI/main.swift.
  VitrineCLI:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Vitrine
        excludes:
          - "Resources/Info.plist"
          - "Resources/Vitrine.entitlements"
          # Direct-download (Sparkle) entitlements superset (CS-064); the CLI ships no
          # updater, so this is never compiled or ingested here.
          - "Resources/Vitrine.DirectDownload.entitlements"
          - "Resources/Fonts"
          # The GUI's @main App scene; the CLI provides its own main.swift entry.
          - "App/VitrineApp.swift"
          # The automation surfaces (CS-034) target the GUI app only: App Intents
          # need the AppIntents framework (not linked into this headless tool) and
          # the Services menu is a windowed-app concept. The CLI is the scriptable
          # path itself, so it neither links nor compiles these.
          - "AppIntents"
          - "Services"
          # Local HTML rendering (CS-042) drives an offscreen WKWebView, which needs
          # a window-server connection at runtime that this headless tool does not
          # have. The CLI renders code, not web content, so it neither links WebKit
          # nor compiles the WebKit renderers. The value-only WebSnapshotConfig below
          # is included explicitly because shared AppSettings/WebDefaults persist URL
          # capture preferences even though the CLI never renders webpages.
          - "WebRendering"
      - path: Vitrine/WebRendering/WebSnapshotConfig.swift
      - path: VitrineCLI
    dependencies:
      - package: Highlightr
      - package: KeyboardShortcuts
      - package: Settings
    # A command-line tool has no Contents/Resources, so a "Copy Bundle Resources"
    # phase cannot stage the bundled fonts. Copy the Fonts folder next to the binary
    # instead, where CLIEnvironment locates and registers it at launch (CS-033). This
    # is what keeps a default CLI render in JetBrains Mono pixel-identical to the app
    # rather than falling back to the system monospaced font.
    postCompileScripts:
      - name: Stage bundled fonts next to the binary
        basedOnDependencyAnalysis: false
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/Fonts"
        script: |
          set -euo pipefail
          DEST="${BUILT_PRODUCTS_DIR}/Fonts"
          rm -rf "${DEST}"
          mkdir -p "${DEST}"
          cp "${SRCROOT}/Vitrine/Resources/Fonts/"*.ttf "${DEST}/"
    settings:
      base:
        PRODUCT_NAME: vitrine
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.vitrine.cli
        # A tool is not a sandboxed .app: render is fully local and needs no
        # entitlements, network, screen recording, or Accessibility (CS-033). The
        # font-staging build phase also writes next to the binary, so user-script
        # sandboxing (on for the shipping app) is off for this dev tool target.
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_STYLE: Automatic
        # The CLI is neither the direct-download app nor an App Store build — it is a
        # headless dev tool that ships no updater and does not link Sparkle (CS-064).
        # Drop the VITRINE_DIRECT_DOWNLOAD flag the project base sets so the shared
        # SoftwareUpdater compiles to its no-op form here and never tries to import
        # Sparkle (which this target does not depend on). Overriding without
        # $(inherited) replaces the base value rather than extending it.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

  VitrineTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
        # The golden-image fixtures (CS-025) are read from the source tree via
        # #filePath, not from the test bundle, so they must not be ingested as
        # bundle resources (which would also run them through copypng on every
        # build). Exclude the whole fixtures tree from the test target sources.
        excludes:
          - "Fixtures"
    dependencies:
      - target: Vitrine
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.vitrine.VitrineTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Vitrine.app/Contents/MacOS/Vitrine"
        BUNDLE_LOADER: "$(TEST_HOST)"
        # `@testable import Vitrine` pulls in Vitrine's module interface, which
        # transitively references the Sparkle module under VITRINE_DIRECT_DOWNLOAD
        # (set on this target via the project base). Point the compiler at the
        # locally-fetched framework (scripts/fetch-sparkle.sh → Vendor/) so it can
        # resolve that module dependency. The symbols come from the host app, which
        # embeds Sparkle (TEST_HOST/BUNDLE_LOADER), so this target neither links nor
        # embeds the framework itself — only the search path is needed (CS-064).
        FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/Vendor

  VitrineUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UITests
    dependencies:
      - target: Vitrine
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.vitrine.VitrineUITests
        # XCTestCase's Objective-C lifecycle is nonisolated; keep this target
        # nonisolated and mark XCUIAutomation test methods as @MainActor.
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        TEST_TARGET_NAME: Vitrine

schemes:
  Vitrine:
    build:
      targets:
        Vitrine: all
        VitrineTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      # Pin the unit-test host to English so the suite is deterministic regardless of the
      # developer's app-language preference. The app persists its UI language in
      # `AppleLanguages` under its own domain (CS-047 language switcher) and the XCTest
      # host (Vitrine.app) inherits it — so running the app in Spanish would make every
      # English-string assertion (Notifier, Privacy, Localization) fail locally while CI
      # stays green. This writes `AppleLanguages=(en)` into the host's NSArgumentDomain;
      # the `es`-specific tests load the `es` bundle explicitly, and the language-override
      # persistence tests read the suite's persistent domain (bypassing the argument
      # domain) so neither is masked by this pin.
      language: en
      region: US
      targets:
        - VitrineTests
      # Forward the opt-in generator flags into the test runner's environment.
      # xcodebuild does not pass arbitrary host env vars to the test process, so each
      # value is a build-setting macro that expands from the value supplied on the
      # corresponding `make` command line. Unset (a normal `make test`) they expand
      # to empty and the matching opt-in suite stays skipped.
      #   - VITRINE_RECORD_GOLDENS  → golden-image recorder (CS-025, `make record-goldens`)
      #   - VITRINE_GENERATE_GALLERY → launch-gallery generator (CS-039, `make gallery`)
      #   - VITRINE_RECORD_SOCIAL_CARD → social-card golden recorder (CS-041)
      environmentVariables:
        - variable: VITRINE_RECORD_GOLDENS
          value: $(VITRINE_RECORD_GOLDENS)
          isEnabled: true
        - variable: VITRINE_GENERATE_GALLERY
          value: $(VITRINE_GENERATE_GALLERY)
          isEnabled: true
        - variable: VITRINE_RECORD_SOCIAL_CARD
          value: $(VITRINE_RECORD_SOCIAL_CARD)
          isEnabled: true
    profile:
      config: Release

  VitrineCLI:
    build:
      targets:
        VitrineCLI: all
    run:
      config: Debug

  VitrineUITests:
    build:
      targets:
        Vitrine: all
        VitrineUITests: [test]
    test:
      config: Debug
      # Match the unit-test host pin above: the UI smoke suite asserts English menu
      # and toolbar labels unless a test explicitly opts into a pseudolocale. Without
      # this, a developer who last ran Vitrine in another app language (for example
      # Spanish) gets localized menu-bar and Settings titles while CI stays green.
      language: en
      region: US
      targets:
        - VitrineUITests
